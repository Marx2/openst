services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false

  test:
    build:
      context: .
      target: test
    profiles: ["test"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
    env_file:
      - path: .env
        required: false
